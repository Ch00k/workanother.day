default_language_version:
  python: python3.14

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-check
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.3
    hooks:
      - id: uv-lock

  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: ty check
        language: python
        pass_filenames: false
        args:
          - --python=.venv/

