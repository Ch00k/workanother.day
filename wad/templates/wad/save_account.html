{% extends "wad/base.html" %}
{% block title %}Your Access Token - Work Another Day{% endblock %}

{% block body %}
<div class="flex items-center justify-center bg-bg px-4" style="min-height: calc(100vh - 5rem)">
    <div class="w-full max-w-sm">
        <h1 class="text-3xl font-bold text-[#222] mb-2">Here's your token</h1>
        <p class="text-sm text-[#666] mb-4">Save it somewhere safe. This is the only way to access your data again.</p>

        <div class="rounded-[10px] bg-[#f5f5f5] border border-[#ddd] px-4 py-3 text-center">
            <code class="text-lg font-mono font-bold tracking-wider select-all">{{ token }}</code>
        </div>

        <p class="text-sm font-semibold text-red-600 mt-3">This token will not be shown again.</p>

        <a href="{% url 'contract_list' %}"
           class="mt-4 block text-center rounded-[10px] bg-[#333] text-white px-4 py-2.5 text-sm font-semibold hover:opacity-90 transition">
            Continue
        </a>
    </div>
</div>
{% endblock %}
